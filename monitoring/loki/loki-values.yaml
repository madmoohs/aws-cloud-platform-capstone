loki:
  persistence:
    enabled: true
    size: 10Gi

  service:
    type: ClusterIP

config:
  auth_enabled: false
  ingester:
    chunk_idle_period: 3m
    chunk_retain_period: 1m
    max_transfer_retries: 0
  schema_config:
    configs:
      - from: 2020-10-24
        store: boltdb-shipper
        object_store: filesystem
        schema: v11
        index:
          prefix: index_
          period: 24h