name: CD - Staging
run-name: CD - Staging

on:
  push:
    branches: [main]
    paths:
      - 'helm/values-staging.yaml'

jobs:
  sync:
    name: Trigger ArgoCD Sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify Helm Values
        run: |
          echo "Helm values updated for staging environment"
          echo "ArgoCD will automatically detect and sync the changes"
          cat helm/values-staging.yaml
