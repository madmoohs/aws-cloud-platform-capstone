name: CD - Production
run-name: CD - Production

on:
  push:
    branches: [main]
    paths:
      - 'helm/values-prod.yaml'

jobs:
  sync:
    name: Trigger ArgoCD Sync
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Verify Helm Values
        run: |
          echo "Helm values updated for production environment"
          echo "ArgoCD will automatically detect and sync the changes"
          cat helm/values-prod.yaml
